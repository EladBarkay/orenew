name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (a new push to a PR kills the old run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      # Tauri's Linux build/test deps (webkit, gtk, svg, appimage tooling).
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # TS typecheck (tsc) + Vite build. Proves the frontend compiles.
      - name: Build frontend
        run: npm run build

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # Debug profile — build.rs only panics on placeholder creds for `release`,
      # so tests run without Supabase/entitlement secrets. The release-only perf
      # test (`cargo test --release -- --ignored perf`) is intentionally NOT a
      # merge gate: it needs release creds and is timing-sensitive on shared
      # runners. Run it locally.
      - name: Test
        working-directory: src-tauri
        run: cargo test
