name: CI

on:
  pull_request:
    branches: [main]
  # Runs on main too so the default-branch Rust cache stays warm — PR runs
  # (including dependabot's) restore from it instead of compiling cold.
  push:
    branches: [main]

# Cancel superseded runs on the same ref (a new push to a PR kills the old run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# CI doesn't need optimized dependencies; the dev profile builds deps at
# opt-level 3 (for fast `tauri dev` image work, see Cargo.toml), which dominates
# compile time here. The clippy/test steps below override deps to opt-level 0 via
# `--config` (cargo has no env form for the `package."*"` glob).

jobs:
  ci:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Tauri's Linux build/test deps (webkit, gtk, svg, appimage tooling).
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # TS typecheck (tsc) + Vite build. Proves the frontend compiles.
      - name: Build frontend
        run: npm run build

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --config 'profile.dev.package."*".opt-level=0' --all-targets -- -D warnings

      # Debug profile — build.rs only panics on placeholder creds for `release`,
      # so tests run without Supabase/entitlement secrets. The release-only perf
      # test (`cargo test --release -- --ignored perf`) is intentionally NOT a
      # merge gate: it needs release creds and is timing-sensitive on shared
      # runners. Run it locally.
      - name: Test
        working-directory: src-tauri
        run: cargo test --config 'profile.dev.package."*".opt-level=0'
