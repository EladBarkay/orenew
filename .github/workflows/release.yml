name: Release

on:
  push:
    # Coarse glob gate — strict semver is re-checked in the validate step below.
    tags: ['v[0-9]*.[0-9]*.[0-9]*']

# Releases must not cancel each other.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Fail fast on a malformed tag before spinning up 3 build runners.
  validate-tag:
    runs-on: ubuntu-22.04
    steps:
      - name: Validate semver tag
        env:
          REF: ${{ github.ref_name }}
        run: |
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::Tag '$REF' is not strict semver (expected vMAJOR.MINOR.PATCH[-prerelease])."
            exit 1
          fi
          echo "Tag '$REF' OK."

  release:
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage
          - platform: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
    runs-on: ${{ matrix.runner }}
    # Job-level so the signing step's `if:` can read it (secrets aren't available
    # directly in step `if:` conditions).
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
    steps:
      - uses: actions/checkout@v7

      - name: Install system deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Windows code signing — only runs when the cert secret is set, so forks
      # and unsigned dry runs still build. Imports the .pfx into the user cert
      # store and injects its thumbprint into tauri.conf.json, which tauri reads
      # at bundle time.
      - name: Configure Windows signing
        if: matrix.platform == 'windows' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        env:
          # WINDOWS_CERTIFICATE inherited from job env.
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pwd = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          $conf = "src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          if (-not $json.bundle.windows) {
            $json.bundle | Add-Member -Name windows -Value (@{}) -MemberType NoteProperty -Force
          }
          $json.bundle.windows | Add-Member -Name certificateThumbprint -Value $cert.Thumbprint -MemberType NoteProperty -Force
          $json | ConvertTo-Json -Depth 100 | Set-Content $conf
          Write-Host "Signing configured with thumbprint $($cert.Thumbprint)"

      - name: Build & release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Release build creds — build.rs panics if any stay at placeholder.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ENTITLEMENT_PUBLIC_KEY: ${{ secrets.ENTITLEMENT_PUBLIC_KEY }}
          # Tauri updater artifact signing (required by createUpdaterArtifacts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Orenew ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
