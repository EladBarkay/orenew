[package]
name = "magnet-app"
version = "0.1.0"
description = "A Tauri app"
edition = "2021"

[dependencies]
image = "0.25"
rayon = "1.10"
rexif = "0.7"
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
log = "0.4"
tempfile = "3.10"
tauri = { version = "2.0", features = [] }
serde_json = "1.0"
rusqlite = { version = "0.31", features = ["bundled"] }

[lib]
path = "src/lib.rs"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "magnet-app"
path = "src/main.rs"
